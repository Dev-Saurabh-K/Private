<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 100" width="100%" height="100%">
  <defs>
    <!-- Background color to match the image context if needed -->
    <style>
      .logo-text {
        font-family: 'Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
        font-weight: 700;
        font-size: 54px;
        letter-spacing: -0.5px;
      }
      .shadow-layer {
        fill: #d97706; /* Deep orange/amber shadow tint */
        opacity: 0.8;
      }
      .main-layer {
        fill: #000000; /* Crisp black main text */
      }
    </style>
  </defs>

  <!-- Optional subtle off-white background canvas from the image -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />

  <g transform="translate(25, 68)">
    <!-- Shadow Layer (Shifted slightly left and down for that specific edge glow) -->
    <text x="-1.5" y="1" class="logo-text shadow-layer">SynaptiQ</text>
    
    <!-- Main Text Layer -->
    <text x="0" y="0" class="logo-text main-layer">SynaptiQ</text>
  </g>
</svg>
